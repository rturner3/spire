version: '3'
services:
  mysql-5-5:
    image: mysql:5.5
    environment:
      - MYSQL_PASSWORD=test
      - MYSQL_DATABASE=spire
      - MYSQL_USER=spire
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
    ports:
      - "9999:3306"
  mysql-5-6:
    image: mysql:5.6
    environment:
      - MYSQL_PASSWORD=test
      - MYSQL_DATABASE=spire
      - MYSQL_USER=spire
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
    ports:
      - "9999:3306"
  mysql-5-7:
    image: mysql:5.7
    environment:
      - MYSQL_PASSWORD=test
      - MYSQL_DATABASE=spire
      - MYSQL_USER=spire
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
    ports:
      - "9999:3306"
  mysql-8-0:
    image: mysql:8.0
    environment:
      - MYSQL_PASSWORD=test
      - MYSQL_DATABASE=spire
      - MYSQL_USER=spire
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
    ports:
      - "9999:3306"
  mysql-5-7-readwrite:
    image: mysql/mysql-server:5.7
    environment:
      - MYSQL_PASSWORD=test
      - MYSQL_DATABASE=spire
      - MYSQL_USER=spire
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
    ports:
      - "9999:3306"
    container_name: mysql-5-7-readwrite
    command:
      - "--server-id=1"
      - "--log-bin=mysql-bin-1.log"
      - "--enforce-gtid-consistency=ON"
      - "--log-slave-updates=ON"
      - "--gtid-mode=ON"
      - "--transaction-write-set-extraction=XXHASH64"
      - "--binlog-checksum=NONE"
      - "--master-info-repository=TABLE"
      - "--relay-log-info-repository=TABLE"
      - "--plugin-load=group_replication.so"
      - "--relay-log-recovery=ON"
      - "--group-replication-start-on-boot=OFF"
      - "--group-replication-group-name=43991639-43EE-454C-82BD-F08A13F3C3ED"
      - "--group-replication-local-address=mysql-5-7-readwrite:33061"
      - "--group-replication-group-seeds=mysql-5-7-readwrite:33061,mysql-5-7-readonly:33061"
      - "--group-replication-single-primary-mode=ON"
      - "--group-replication-enforce-update-everywhere-checks=OFF"
  mysql-5-7-readonly:
    image: mysql/mysql-server:5.7
    environment:
      - MYSQL_PASSWORD=test
      - MYSQL_DATABASE=spire
      - MYSQL_USER=spire
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
    ports:
      - "10000:3306"
    container_name: mysql-5-7-readonly
    command:
      - "--server-id=2"
      - "--log-bin=mysql-bin-1.log"
      - "--enforce-gtid-consistency=ON"
      - "--log-slave-updates=ON"
      - "--gtid-mode=ON"
      - "--transaction-write-set-extraction=XXHASH64"
      - "--binlog-checksum=NONE"
      - "--master-info-repository=TABLE"
      - "--relay-log-info-repository=TABLE"
      - "--plugin-load=group_replication.so"
      - "--relay-log-recovery=ON"
      - "--group-replication-start-on-boot=OFF"
      - "--group-replication-group-name=43991639-43EE-454C-82BD-F08A13F3C3ED"
      - "--group-replication-local-address=mysql-5-7-readonly:33061"
      - "--group-replication-group-seeds=mysql-5-7-readwrite:33061,mysql-5-7-readonly:33061"
      - "--group-replication-single-primary-mode=ON"
      - "--group-replication-enforce-update-everywhere-checks=OFF"
